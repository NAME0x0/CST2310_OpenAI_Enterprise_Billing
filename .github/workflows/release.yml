name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build Report Artefacts
    runs-on: ubuntu-latest
    container:
      image: pandoc/extra:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build report (DOCX)
        run: |
          cd 08-final-report
          pandoc report.md \
            -o "CST2310_Report_${{ steps.version.outputs.tag }}.docx" \
            --from=gfm \
            --to=docx \
            --toc \
            --toc-depth=3 \
            --number-sections \
            --metadata title="OpenAI Enterprise Billing System — Requirements Specification Report" \
            --metadata date="$(date +%Y-%m-%d)"

      - name: Build report (PDF)
        run: |
          cd 08-final-report
          pandoc report.md \
            -o "CST2310_Report_${{ steps.version.outputs.tag }}.pdf" \
            --from=gfm \
            --to=pdf \
            --toc \
            --toc-depth=3 \
            --number-sections \
            -V geometry:margin=2.5cm \
            -V fontsize=11pt \
            --pdf-engine=xelatex \
            --metadata title="OpenAI Enterprise Billing System — Requirements Specification Report" \
            --metadata date="$(date +%Y-%m-%d)"

      - name: Upload build artefacts
        uses: actions/upload-artifact@v4
        with:
          name: release-files
          path: |
            08-final-report/CST2310_Report_${{ steps.version.outputs.tag }}.docx
            08-final-report/CST2310_Report_${{ steps.version.outputs.tag }}.pdf

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Download build artefacts
        uses: actions/download-artifact@v4
        with:
          name: release-files
          path: release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/08-final-report/CST2310_Report_${{ steps.version.outputs.tag }}.docx
            release/08-final-report/CST2310_Report_${{ steps.version.outputs.tag }}.pdf
          body: |
            ## OpenAI Enterprise Billing System Report — ${{ steps.version.outputs.tag }}

            This release was automatically generated from the latest `report.md`.

            ### Downloads
            - **DOCX** — Open in Microsoft Word for final formatting review
            - **PDF** — Print-ready version

            ### What changed
            See the auto-generated changelog below.
